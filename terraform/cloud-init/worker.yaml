#cloud-config
# =============================================================================
# cloud-init/worker.yaml — First-boot конфигурация за Worker nodes
# =============================================================================
#
# Идентична на control.yaml — workers имат същите kernel/sysctl изисквания.
# Разликата е само в hostname и IP адреса (попълват се от Terraform).
#
# Workers НЕ пускат etcd и control plane компоненти.
# Те само пускат kubelet + containerd + workload pods.
# =============================================================================

hostname: ${hostname}
fqdn: ${hostname}.k8s.local
manage_etc_hosts: true

users:
  - name: ${ssh_user}
    groups: [sudo, adm]
    shell: /bin/bash
    sudo: ["ALL=(ALL) NOPASSWD:ALL"]
    ssh_authorized_keys:
      - ${ssh_public_key}

write_files:
  - path: /etc/netplan/99-static.yaml
    permissions: '0600'
    content: |
      network:
        version: 2
        ethernets:
          enp0s5:
            dhcp4: false
            addresses:
              - ${ip_address}/24
            routes:
              - to: default
                via: ${gateway}
            nameservers:
              addresses: [${dns_server}, 1.1.1.1]

  - path: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter

  - path: /etc/sysctl.d/k8s.conf
    content: |
      net.bridge.bridge-nf-call-iptables  = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward                 = 1

runcmd:
  - netplan apply
  - modprobe overlay
  - modprobe br_netfilter
  - sysctl --system
  - apt-get update -y
  - apt-get install -y curl wget git htop python3 python3-pip apt-transport-https ca-certificates gnupg lsb-release
  - swapoff -a
  - sed -i '/swap/d' /etc/fstab
  - echo "cloud-init done" > /var/log/cloud-init-done.txt

power_state:
  mode: reboot
  delay: "+1"
  message: "Rebooting after cloud-init"
