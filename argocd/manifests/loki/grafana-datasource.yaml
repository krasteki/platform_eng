---
# Grafana Datasource ConfigMap за Loki
# kube-prometheus-stack Grafana sidecar открива ConfigMaps с label grafana_datasource: "1"
# и автоматично ги добавя като datasource в Grafana — без рестарт!
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-grafana-datasource
  namespace: monitoring
  labels:
    grafana_datasource: "1"
data:
  loki-datasource.yaml: |-
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        access: proxy
        url: http://loki:3100
        isDefault: false
        jsonData:
          maxLines: 1000
        version: 1
        editable: false
