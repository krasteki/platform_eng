apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: finpulse-alerts
  namespace: monitoring
  labels:
    # Required for kube-prometheus-stack to discover this rule
    release: kube-prometheus-stack
spec:
  groups:
    - name: finpulse.pods
      interval: 1m
      rules:
        # Pod is crash-looping
        - alert: FinPulsePodCrashLooping
          expr: |
            rate(kube_pod_container_status_restarts_total{namespace="finpulse"}[5m]) * 60 > 1
          for: 5m
          labels:
            severity: critical
            app: finpulse
          annotations:
            summary: "Pod {{ $labels.pod }} is crash-looping"
            description: "Container {{ $labels.container }} in pod {{ $labels.pod }} is restarting more than once per minute."

        # Pod not ready for >5 min
        - alert: FinPulsePodNotReady
          expr: |
            kube_pod_status_ready{namespace="finpulse", condition="true"} == 0
          for: 5m
          labels:
            severity: warning
            app: finpulse
          annotations:
            summary: "Pod {{ $labels.pod }} is not ready"
            description: "Pod {{ $labels.pod }} in namespace finpulse has been not ready for more than 5 minutes."

        # OOMKilled container
        - alert: FinPulseOOMKilled
          expr: |
            kube_pod_container_status_last_terminated_reason{namespace="finpulse", reason="OOMKilled"} == 1
          for: 0m
          labels:
            severity: critical
            app: finpulse
          annotations:
            summary: "Container {{ $labels.container }} was OOMKilled"
            description: "Container {{ $labels.container }} in pod {{ $labels.pod }} was killed due to out-of-memory."

    - name: finpulse.resources
      interval: 2m
      rules:
        # High CPU usage (>85% of limit)
        - alert: FinPulseHighCPU
          expr: |
            (
              sum by (pod, container) (
                rate(container_cpu_usage_seconds_total{namespace="finpulse", container!=""}[5m])
              )
              /
              sum by (pod, container) (
                kube_pod_container_resource_limits{namespace="finpulse", resource="cpu"}
              )
            ) > 0.85
          for: 10m
          labels:
            severity: warning
            app: finpulse
          annotations:
            summary: "High CPU on {{ $labels.pod }}"
            description: "Container {{ $labels.container }} is using >85% of its CPU limit for 10 minutes."

        # High memory usage (>85% of limit)
        - alert: FinPulseHighMemory
          expr: |
            (
              sum by (pod, container) (
                container_memory_working_set_bytes{namespace="finpulse", container!=""}
              )
              /
              sum by (pod, container) (
                kube_pod_container_resource_limits{namespace="finpulse", resource="memory"}
              )
            ) > 0.85
          for: 10m
          labels:
            severity: warning
            app: finpulse
          annotations:
            summary: "High memory on {{ $labels.pod }}"
            description: "Container {{ $labels.container }} is using >85% of its memory limit for 10 minutes."

    - name: finpulse.storage
      interval: 5m
      rules:
        # PVC filling up (>80%)
        - alert: FinPulsePVCFillingUp
          expr: |
            (
              kubelet_volume_stats_used_bytes{namespace="finpulse"}
              /
              kubelet_volume_stats_capacity_bytes{namespace="finpulse"}
            ) > 0.80
          for: 5m
          labels:
            severity: warning
            app: finpulse
          annotations:
            summary: "PVC {{ $labels.persistentvolumeclaim }} is >80% full"
            description: "PersistentVolumeClaim {{ $labels.persistentvolumeclaim }} in namespace finpulse is {{ $value | humanizePercentage }} full."

    - name: cluster.nodes
      interval: 2m
      rules:
        # Node not ready
        - alert: NodeNotReady
          expr: kube_node_status_condition{condition="Ready", status="true"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Node {{ $labels.node }} is NotReady"
            description: "Node {{ $labels.node }} has been in NotReady state for more than 5 minutes."

        # Node disk pressure
        - alert: NodeDiskPressure
          expr: kube_node_status_condition{condition="DiskPressure", status="true"} == 1
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.node }} has disk pressure"
            description: "Node {{ $labels.node }} is under DiskPressure — running low on disk space."

        # Node memory pressure
        - alert: NodeMemoryPressure
          expr: kube_node_status_condition{condition="MemoryPressure", status="true"} == 1
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Node {{ $labels.node }} has memory pressure"
            description: "Node {{ $labels.node }} is under MemoryPressure."
