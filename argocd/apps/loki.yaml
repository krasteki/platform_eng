apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki-stack
    targetRevision: "2.10.*"
    helm:
      values: |
        loki:
          enabled: true
          persistence:
            enabled: true
            size: 5Gi
            storageClassName: local-path
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
          config:
            chunk_store_config:
              max_look_back_period: 168h   # 7 дни
            table_manager:
              retention_deletes_enabled: true
              retention_period: 168h
        promtail:
          enabled: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
        # Grafana и Prometheus вече са инсталирани от kube-prometheus-stack
        grafana:
          enabled: false
        prometheus:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
