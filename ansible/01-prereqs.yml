---
# 01-prereqs.yml
# Инсталира containerd + kubeadm/kubelet/kubectl на всички K8s nodes
# Изпълнява се върху: k8s_nodes (control_plane + workers)
#
# Usage: ansible-playbook -i inventory.ini 01-prereqs.yml

- name: Kubernetes prerequisites
  hosts: k8s_nodes
  become: true
  gather_facts: true

  tasks:

    # ─── Kernel modules ─────────────────────────────────────────────────────
    - name: Load required kernel modules
      community.general.modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter

    - name: Persist kernel modules
      copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          overlay
          br_netfilter

    # ─── Sysctl ─────────────────────────────────────────────────────────────
    - name: Set sysctl params for Kubernetes networking
      sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        sysctl_file: /etc/sysctl.d/k8s.conf
        reload: true
      loop:
        - { key: net.bridge.bridge-nf-call-iptables,  value: "1" }
        - { key: net.bridge.bridge-nf-call-ip6tables, value: "1" }
        - { key: net.ipv4.ip_forward,                 value: "1" }

    # ─── Swap ───────────────────────────────────────────────────────────────
    - name: Disable swap now
      command: swapoff -a
      changed_when: false

    - name: Remove swap from fstab
      replace:
        path: /etc/fstab
        regexp: '^([^#].*\s+swap\s+.*)$'
        replace: '# \1'

    # ─── containerd ─────────────────────────────────────────────────────────
    - name: Install containerd dependencies
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: true

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker apt repository
      apt_repository:
        repo: "deb [arch=arm64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        filename: docker

    - name: Install containerd
      apt:
        name: "containerd.io={{ containerd_version }}"
        state: present
        update_cache: true

    - name: Generate default containerd config
      shell: containerd config default > /etc/containerd/config.toml
      args:
        creates: /etc/containerd/config.toml

    - name: Enable SystemdCgroup in containerd
      replace:
        path: /etc/containerd/config.toml
        regexp: 'SystemdCgroup = false'
        replace: 'SystemdCgroup = true'

    - name: Enable and restart containerd
      systemd:
        name: containerd
        enabled: true
        state: restarted

    # ─── Kubernetes packages ─────────────────────────────────────────────────
    - name: Add Kubernetes GPG key
      apt_key:
        url: "https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/Release.key"
        state: present

    - name: Add Kubernetes apt repository
      apt_repository:
        repo: "deb https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/ /"
        state: present
        filename: kubernetes

    - name: Install kubeadm, kubelet, kubectl
      apt:
        name:
          - "kubeadm={{ k8s_version_full }}"
          - "kubelet={{ k8s_version_full }}"
          - "kubectl={{ k8s_version_full }}"
        state: present
        update_cache: true

    - name: Hold Kubernetes packages at current version
      dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - kubeadm
        - kubelet
        - kubectl

    - name: Enable kubelet
      systemd:
        name: kubelet
        enabled: true
