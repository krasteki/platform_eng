---
# 02-haproxy.yml
# Инсталира и конфигурира HAProxy на LB node-а
# HAProxy балансира API server трафика към 3-те control plane nodes
#
# Usage: ansible-playbook -i inventory.ini 02-haproxy.yml

- name: Configure HAProxy load balancer
  hosts: lb
  become: true
  gather_facts: true

  tasks:

    - name: Install HAProxy
      apt:
        name: haproxy
        state: present
        update_cache: true

    - name: Configure HAProxy
      copy:
        dest: /etc/haproxy/haproxy.cfg
        content: |
          global
              log /dev/log local0
              log /dev/log local1 notice
              chroot /var/lib/haproxy
              stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
              stats timeout 30s
              user haproxy
              group haproxy
              daemon

          defaults
              log     global
              mode    tcp
              option  tcplog
              option  dontlognull
              timeout connect 5000ms
              timeout client  50000ms
              timeout server  50000ms

          frontend k8s-api
              bind *:{{ lb_port }}
              mode tcp
              default_backend k8s-control-plane

          backend k8s-control-plane
              mode tcp
              balance roundrobin
              option tcp-check
              server control-01 10.211.55.11:6443 check fall 3 rise 2
              server control-02 10.211.55.12:6443 check fall 3 rise 2
              server control-03 10.211.55.13:6443 check fall 3 rise 2

          listen stats
              bind *:8080
              mode http
              stats enable
              stats uri /stats
              stats refresh 10s
              stats auth admin:admin
        owner: root
        group: root
        mode: "0644"

    - name: Enable and start HAProxy
      systemd:
        name: haproxy
        enabled: true
        state: restarted

    - name: Verify HAProxy is listening on 6443
      wait_for:
        port: 6443
        host: "{{ inventory_hostname }}"
        timeout: 30
